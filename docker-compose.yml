version: '3.9'

services:
  gateway:
    build: 
      context: ./gateway
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - AUTH_SERVICE_URL=http://auth:8001
      - OAUTH_SERVICE_URL=http://oauth:8002
      - DASHBOARD_SERVICE_URL=http://dashboard:8003
      - INTERVIEW_SERVICE_URL=http://interview:8004
      - REDIS_HOST=redis
    depends_on:
      - redis
      - auth
      - oauth
      - dashboard
      - interview

  auth:
    build:
      context: ./services/auth
    ports:
      - "8001:8001"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=socraticmind_auth
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - JWT_ACCESS_SECRET=dev-access-secret-change-in-production-use-256-bit-random
      - JWT_REFRESH_SECRET=dev-refresh-secret-change-in-production-use-256-bit-random
    depends_on:
      - postgres
      - redis

  oauth:
    build:
      context: ./services/oauth
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=socraticmind_oauth
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - AUTH_SERVICE_URL=http://auth:8001
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      - postgres
      - auth

  dashboard:
    build:
      context: ./services/dashboard
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=socraticmind_dashboard
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      - postgres

  interview:
    build:
      context: ./services/interview
    ports:
      - "8004:8004"
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/socraticmind_interviews
      - AUTH_SERVICE_URL=http://auth:8001
    depends_on:
      - mongo

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: socraticmind_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
  mongo-data:
